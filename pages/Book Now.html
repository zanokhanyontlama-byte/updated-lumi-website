<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Experience ultimate relaxation at Lumi Beauty Spa. From rejuvenating facials to body treatments, our expert team is dedicated to your glow. Book today!">
  <meta name="keywords" content="spa, beauty, relaxation, facials, body treatments">
  <meta name="author" content="Zukhanye Ntlama">
  <title>Book Now – Lumi Beauty Spa</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>

    @media (max-width: 600px) {
      .nav-links { display: none; flex-direction: column; gap: 8px; }
      .nav-links.active { display: flex; }
      .hamburger { display: flex; }
    }
  </style>
</head>
<body>

  <main>
    <section>
      <h1 id="mylogo">Lumi</h1>

      <header>
       <h1 id="mylogo">Lumi</h1>
<nav class="nav-links"> <center>
<a href="../index.html">Home</a>
<a href="./pages/about us.html">About Us</a>
<a href="./pages/services.html">Services</a>
<a href="./pages/Book Now.html">Book Now</a>
<a href="./pages/contact.html">Contact</a>
<a href="./pages/Pay Now.html">Pay Now</a></center>
</nav>
        <!-- Hamburger for mobile -->
        <div class="hamburger" aria-label="Toggle navigation" role="button" tabindex="0">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </header>

      <hr>
      <br>

      <div style="text-align:center;">
        <h1><b>Book Your Appointment</b></h1>

        <!-- Live clock display (separate from the time input) -->
        <p id="clock-display">Loading time...</p>

        <form class="forms-container" id="form1" novalidate>

          <label for="first-name" class="form-label">First Name:</label>
          <input type="text" id="first-name" name="first-name" placeholder="Zukhanye" required>

          <label for="last-name" class="form-label">Last Name:</label>
          <input type="text" id="last-name" name="last-name" placeholder="Ntlama" required>

          <label for="email" class="form-label">Email:</label>
          <input type="email" id="email" name="email" placeholder="ZukhanyeNtlama@gmail.com" required>

          <label for="phone" class="form-label">Phone Number:</label>
          <input type="tel" id="phone" name="phone" placeholder="072 914 9706" required>

          <label for="service" class="form-label">Select Service:</label>
          <select id="service" name="service" required>
            <option value="" data-price="0">--select service--</option>
            <option value="Signature Cut & Style" data-price="775">Signature Cut &amp; Style - R775</option>
            <option value="Color Treatment" data-price="1100">Color Treatment - R1,100</option>
            <option value="Highlights" data-price="1375">Highlights (Full) - R1,375</option>
            <option value="Keratin Treatment" data-price="1825">Keratin Treatment - R1,825</option>
            <option value="Balayage" data-price="1650">Balayage - R1,650</option>
            <option value="Sew-In Weave" data-price="2250">Sew-In Weave Installation - R2,250</option>
            <option value="Clip-in Extensions" data-price="1400">Clip-in Extensions - R1,400</option>
            <option value="Tape-In Extensions" data-price="1600">Tape-In Extensions - R1,600</option>
            <option value="Micro-link Extensions" data-price="1900">Micro-link Extensions - R1,900</option>
            <option value="Virgin Brazilian Hair" data-price="600">Virgin Brazilian Hair (per bundle) - R600</option>
            <option value="Classic Manicure" data-price="250">Classic Manicure - R250</option>
            <option value="Gel Manicure" data-price="350">Gel Manicure - R350</option>
            <option value="Nail Art" data-price="75">Nail Art (per nail) - R75</option>
            <option value="French Manicure" data-price="365">French Manicure - R365</option>
            <option value="Signature Facial" data-price="825">Signature Facial - R825</option>
            <option value="Anti-Aging Treatment" data-price="1100">Anti-Aging Treatment - R1,100</option>
            <option value="Deep Cleansing Facial" data-price="600">Deep Cleansing Facial - R600</option>
            <option value="Relaxation Massage" data-price="1000">Relaxation Massage (60min) - R1,000</option>
            <option value="Hot Stone Therapy" data-price="1190">Hot Stone Therapy - R1,190</option>
          </select>

          <!-- Amount due updates dynamically when a service is selected -->
          <p id="amount-due">Amount due: R0.00</p>

          <label for="date" class="form-label">Select Date:</label>
          <input type="date" id="date" name="date" required>

          <label for="appt-time" class="form-label">Select Time:</label>
          <input type="time" id="appt-time" name="appt-time" required>

          <button type="submit"><a href="Pay Now.html" id="pay-now-button">Book Now</a></button>
        </form>

        <br>

        <!-- Toggle message -->
        <p id="message">Welcome to Lumi Beauty Spa! We look forward to seeing you.</p>
        <button type="button" onclick="toggleMessage()">Show / Hide Message</button>

        <br><br>

        <!-- Simple name validation -->
        <input type="text" id="name-input" placeholder="Enter your name">
        <button type="button" onclick="validateForm()">Submit</button>
        <p id="error"></p>
      </div>
    </section>
  </main>

  <hr>
  <footer>
    <p id="footer">&copy;2026 Lumi Beauty Spa. All rights reserved</p>
  </footer>

  <script>
    /* ── 1. Hamburger navigation ── */
    const hamburger = document.querySelector('.hamburger');
    const navLinks  = document.querySelector('.nav-links');

    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      hamburger.classList.toggle('active');
    });
    hamburger.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        navLinks.classList.toggle('active');
        hamburger.classList.toggle('active');
      }
    });

 
    /* ── 4. Show / Hide toggle ── */
    function toggleMessage() {
      const msg = document.getElementById('message');
      msg.style.display = (msg.style.display === 'none' || msg.style.display === '') ? 'block' : 'none';
    }

    /* ── 5. Name validation (fixed function name to match onclick) ── */
    function validateForm() {
      const name = document.getElementById('name-input').value.trim();
      const errorEl = document.getElementById('error');
      if (name === '') {
        errorEl.style.color = 'red';
        errorEl.textContent = 'Name is required!';
      } else {
        errorEl.style.color = 'green';
        errorEl.textContent = 'Form submitted successfully!';
      }
    }
  </script>

</body>
</html>
