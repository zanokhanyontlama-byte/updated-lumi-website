 <script>
            //Activate Hamburger Navigation
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.querySelector('.nav-links');

            hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            hamburger.classList.toggle('active'); // animate hamburger
            });

            //Form Input validation
            const form = document.getElementById('enquiryForm');
            const successMsg = document.getElementById('successMessage');

            form.addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent actual submission

            // Simple form validation
            const name = form.name.value.trim();
            const email = form.email.value.trim();
            const message = form.message.value.trim();
            const type = form.querySelector('input[name="type"]:checked');

            if (!type) {
                alert("Please select an enquiry type.");
                return;
            }
            if (!name || !email || !message) {
                alert("Please fill in all required fields.");
                return;
            }

            // Show success message and clear form
            successMsg.style.display = 'block';
            form.reset();
            });

            //Inserting TimeStamp (Dynamic content)
            function displayTime() {
                const now = new Date();
                let hours = now.getHours();
                let minutes = now.getMinutes();
                let seconds = now.getSeconds();

                // Add leading zeroes for single-digit minutes and seconds
                hours = hours < 10 ? "0" + hours : hours;
                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                const currentTime = hours + ":" + minutes + ":" + seconds;
                document.getElementById("time").textContent = currentTime;
            }

            // Call the displayTime function every second to update the time
            setInterval(displayTime, 1000);

            // Display the time immediately when the page loads
            displayTime();
        </script>
